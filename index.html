<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Ruined My Life</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #f9f8f5;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap {
    text-align: center;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }
  h1 {
    font-size: clamp(48px, 10vw, 96px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 0.95;
    text-transform: uppercase;
  }
  .btn {
    display: inline-block;
    background: #111;
    color: #f9f8f5;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 16px 40px;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.65; }
  .error {
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.08em;
    margin-top: -32px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Music<br>Ruined<br>My Life</h1>
  <a class="btn" href="/api/auth">Connect Spotify</a>
  <div id="error-msg" class="error"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error')) {
    document.getElementById('error-msg').textContent = 'Something went wrong. Try again.';
  }
</script>
</body>
</html>
