<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Ruined My Life</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #f9f8f5;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { text-align: center; max-width: 420px; }
  h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  p {
    font-size: 14px;
    line-height: 1.7;
    color: #888;
    margin-bottom: 40px;
  }
  .btn {
    display: inline-block;
    background: #111;
    color: #f9f8f5;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 16px 40px;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.7; }
  .error {
    margin-top: 24px;
    font-size: 12px;
    color: #888;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Music Ruined My Life</h1>
  <p>Connect your Spotify. Find out what ruined you.</p>
  <a class="btn" href="/api/auth">Connect Spotify</a>
  <div id="error-msg" class="error"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error')) {
    document.getElementById('error-msg').textContent = 'Something went wrong. Try again.';
  }
</script>
</body>
</html>
