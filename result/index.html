<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Ruined My Life</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  html, body {
    min-height: 100%;
    background: #f9f8f5;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
 
  .container {
    width: 100%;
    max-width: 520px;
  }
 
  #loading {
    text-align: center;
  }
  #loading p {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 24px;
  }
  .load-bar-track {
    width: 100%;
    height: 1px;
    background: #e0ddd8;
  }
  .load-bar-fill {
    height: 100%;
    background: #111;
    width: 0%;
    transition: width 0.03s linear;
  }
 
  #result { display: none; }
 
  .line {
    padding: 28px 0;
    border-bottom: 1px solid #e8e5e0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .line:first-child { border-top: 1px solid #e8e5e0; }
 
  .line-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #aaa;
  }
 
  .line-text {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }
 
  .line-text em {
    font-style: normal;
    color: #aaa;
    font-weight: 400;
  }
 
  .footer {
    margin-top: 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer a {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #aaa;
    text-decoration: none;
    border-bottom: 1px solid #e0ddd8;
    padding-bottom: 2px;
    transition: color 0.2s;
  }
  .footer a:hover { color: #111; }
  .footer-brand {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #ccc;
  }
</style>
</head>
<body>
<div class="container">
 
  <div id="loading">
    <p>Assessing damage</p>
    <div class="load-bar-track"><div class="load-bar-fill" id="load-fill"></div></div>
  </div>
 
  <div id="result">
    <div class="line">
      <span class="line-label">Artist</span>
      <div class="line-text"><span id="top-artist"></span> <em>ruined your life</em></div>
    </div>
    <div class="line">
      <span class="line-label">Song</span>
      <div class="line-text"><span id="top-track"></span> <em>ruined your life</em></div>
    </div>
    <div class="line">
      <span class="line-label">Genre</span>
      <div class="line-text"><span id="top-genre"></span> <em>ruined your life</em></div>
    </div>
 
    <div class="footer">
      <a href="/">start over</a>
      <span class="footer-brand">musicruinedmylife.vercel.app</span>
    </div>
  </div>
 
</div>
<script>
  function getParams() {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('data');
    if (!raw) return null;
    try { return JSON.parse(decodeURIComponent(raw)); }
    catch { return null; }
  }
 
  function animateLoad(cb) {
    const fill = document.getElementById('load-fill');
    let w = 0;
    const iv = setInterval(() => {
      w += 1.5;
      fill.style.width = Math.min(w, 95) + '%';
      if (w >= 95) {
        clearInterval(iv);
        setTimeout(() => {
          fill.style.width = '100%';
          setTimeout(cb, 300);
        }, 600);
      }
    }, 20);
  }
 
  function render(data) {
    const artist = data.artists[0]?.name || 'Music';
    const track = data.tracks[0]?.name || 'A song';
    const genre = data.artists[0]?.genres?.[0] || data.artists[1]?.genres?.[0] || 'Your taste';
 
    document.getElementById('top-artist').textContent = artist;
    document.getElementById('top-track').textContent = track;
    document.getElementById('top-genre').textContent = genre.charAt(0).toUpperCase() + genre.slice(1);
  }
 
  window.onload = () => {
    const data = getParams();
    if (!data) { window.location.href = '/'; return; }
    animateLoad(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      render(data);
    });
  };
</script>
</body>
</html>
