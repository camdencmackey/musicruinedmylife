<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Music Ruined Your Life</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 600px;
    padding: 40px 20px;
    text-align: center;
  }

  h1 {
    font-size: 34px;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .sub {
    color: #888;
    margin-bottom: 40px;
    font-size: 14px;
  }

  .grid {
    display: grid;
    gap: 14px;
  }

  .card {
    background: #151515;
    padding: 18px;
    border-radius: 14px;
    text-align: left;
  }

  .label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .value {
    font-size: 20px;
    font-weight: 700;
    margin-top: 6px;
  }

  .tag {
    margin-top: 6px;
    font-size: 13px;
    color: #ff4d4d;
    font-weight: 600;
  }

  .btn {
    display: inline-block;
    margin-top: 40px;
    padding: 12px 20px;
    border: 1px solid #333;
    color: white;
    text-decoration: none;
    border-radius: 10px;
  }

  .btn:hover {
    border-color: white;
  }

  /* Loading */
  #loading {
    color: #888;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="container">

  <div id="loading">Analyzing your taste...</div>

  <div id="content" style="display:none;">
    <h1>Your Music Diagnosis</h1>
    <div class="sub">based on your Spotify activity</div>

    <div class="grid">

      <div class="card">
        <div class="label">Top Artist</div>
        <div class="value" id="artist">—</div>
        <div class="tag">ruined your life</div>
      </div>

      <div class="card">
        <div class="label">Top Song</div>
        <div class="value" id="song">—</div>
        <div class="tag">ruined your life</div>
      </div>

      <div class="card">
        <div class="label">Top Album</div>
        <div class="value" id="album">—</div>
        <div class="tag">ruined your life</div>
      </div>

    </div>

    <a href="/" class="btn">Run it back</a>
  </div>

</div>

<script>
  function getData() {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get("data");
    if (!raw) return null;
    try {
      return JSON.parse(decodeURIComponent(raw));
    } catch {
      return null;
    }
  }

  window.onload = () => {
    const data = getData();

    if (!data) {
      document.getElementById("loading").textContent = "No data found.";
      return;
    }

    const artist = data.artists?.[0]?.name || "Unknown Artist";
    const song = data.tracks?.[0]?.name || "Unknown Song";
    const album = data.tracks?.[0]?.album || "Unknown Album";

    document.getElementById("artist").textContent = artist;
    document.getElementById("song").textContent = song;
    document.getElementById("album").textContent = album;

    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";
  };
</script>

</body>
</html>
