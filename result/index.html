<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Ruined My Life</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #f9f8f5;
    color: #111;
    font-family: 'Bebas Neue', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }
  .container { width: 100%; max-width: 600px; }
  #loading {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .loading-label {
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #aaa;
  }
  .retro-bar { display: flex; gap: 3px; }
  .segment { width: 14px; height: 28px; background: #e0ddd8; transition: background 0.08s; }
  .segment.on { background: #111; }
  #result { display: none; width: 100%; }
  .block { margin-bottom: 40px; }
  .block:last-child { margin-bottom: 0; }
  .name {
    font-size: clamp(52px, 11vw, 96px);
    letter-spacing: -0.01em;
    line-height: 0.9;
    text-transform: uppercase;
    word-break: break-word;
  }
  .tag {
    font-size: clamp(28px, 6vw, 52px);
    letter-spacing: 0.02em;
    line-height: 1;
    text-transform: uppercase;
    color: #bbb;
  }
</style>
</head>
<body>
<div class="container">
  <div id="loading">
    <div class="loading-label" id="loading-label">Analyzing — 0%</div>
    <div class="retro-bar" id="retro-bar"></div>
  </div>
  <div id="result">
    <div class="block">
      <div class="name" id="top-artist"></div>
      <div class="tag">ruined your life</div>
    </div>
    <div class="block">
      <div class="name" id="top-track"></div>
      <div class="tag">ruined your life</div>
    </div>
    <div class="block">
      <div class="name" id="top-genre"></div>
      <div class="tag">ruined your life</div>
    </div>
  </div>
</div>
<script>
  const SEGMENTS = 20;
  function buildBar() {
    const bar = document.getElementById('retro-bar');
    for (let i = 0; i < SEGMENTS; i++) {
      const s = document.createElement('div');
      s.className = 'segment';
      s.id = 'seg-' + i;
      bar.appendChild(s);
    }
  }
  function updateBar(pct) {
    const filled = Math.floor((pct / 100) * SEGMENTS);
    for (let i = 0; i < SEGMENTS; i++) {
      document.getElementById('seg-' + i).classList.toggle('on', i < filled);
    }
    document.getElementById('loading-label').textContent = `Analyzing — ${Math.floor(pct)}%`;
  }
  function animateLoad(cb) {
    let w = 0;
    const iv = setInterval(() => {
      const speed = w < 80 ? 1.8 : w < 93 ? 0.6 : 0.15;
      w = Math.min(w + speed, 95);
      updateBar(w);
      if (w >= 95) {
        clearInterval(iv);
        setTimeout(() => { updateBar(100); setTimeout(cb, 400); }, 700);
      }
    }, 30);
  }
  function getParams() {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('data');
    if (!raw) return null;
    try { return JSON.parse(decodeURIComponent(raw)); }
    catch { return null; }
  }
  function render(data) {
    const artist = data.artists[0]?.name || 'Music';
    const track = data.tracks[0]?.name || 'A Song';
    const genre = data.artists.flatMap(a => a.genres)[0] || 'Your Taste';
    const genreFormatted = genre.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    document.getElementById('top-artist').textContent = artist;
    document.getElementById('top-track').textContent = track;
    document.getElementById('top-genre').textContent = genreFormatted;
  }
  buildBar();
  window.onload = () => {
    const data = getParams();
    if (!data) { window.location.href = '/'; return; }
    animateLoad(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      render(data);
    });
  };
</script>
</body>
</html>
